<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCM ALCE — Manutenção Preventiva</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="brand-org">ASSEMBLEIA LEGISLATIVA DO ESTADO DO CEARÁ</span>
      <span class="brand-name">PCM ALCE</span>
    </div>
    <nav class="tabs" id="tabs">
      <button class="tab active" data-view="upload">Levantamento</button>
      <button class="tab" data-view="config">Cronograma</button>
      <button class="tab" data-view="calendar">Calendário</button>
      <button class="tab" data-view="dashboard">Dashboard</button>
    </nav>
  </div>
</header>

<main class="page">

  <!-- VIEW 1: UPLOAD -->
  <section class="view active" id="view-upload">
    <div class="card">
      <h2>Envie o levantamento</h2>
      <p class="muted">Arquivo .xlsx ou .csv com colunas <strong>Setor</strong>, <strong>Ambiente</strong>. <strong>Patrimônio</strong>.</p>
      <label class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" hidden>
        <span id="dropzoneLabel">Clique ou arraste o arquivo aqui</span>
      </label>
    </div>

    <div class="card" id="previewCard" hidden>
      <div class="card-head">
        <h2>Classificação</h2>
        <span class="pill" id="previewCount">0 itens</span>
      </div>
      <div class="table-wrap">
        <table id="previewTable"></table>
      </div>
    </div>
  </section>

  <!-- VIEW 2: CONFIG / CRONOGRAMA -->
  <section class="view" id="view-config">
    <div class="card">
      <h2>Capacidade da equipe</h2>
      <div class="grid-form">
        <label>Nº de equipes<input type="number" id="nEquipes" value="2" min="1"></label>
        <label>Aparelhos por equipe/dia<input type="number" id="aparelhosDia" value="2" min="1"></label>
        <label>Dias úteis por semana<input type="number" id="diasSemana" value="5" min="1" max="7"></label>
        <label>Data de início<input type="date" id="dataInicio"></label>
      </div>
      <button class="btn primary" id="btnGerar">Gerar cronograma</button>
      <p class="muted" id="resumoCapacidade"></p>
    </div>
  </section>

  <!-- VIEW 3: CALENDAR -->
  <section class="view" id="view-calendar">
    <div class="card">
      <div class="card-head">
        <h2 id="calendarTitle">Calendário</h2>
        <div class="calendar-nav">
          <button class="btn ghost" id="prevMonth">‹</button>
          <button class="btn ghost" id="nextMonth">›</button>
        </div>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="card" id="dayDetailCard" hidden>
      <div class="card-head">
        <h2 id="dayDetailTitle">Dia selecionado</h2>
      </div>
      <div class="table-wrap">
        <table id="dayDetailTable"></table>
      </div>
    </div>
  </section>

  <!-- VIEW 4: DASHBOARD -->
  <section class="view" id="view-dashboard">
    <div class="kpi-row" id="kpiRow"></div>
    <div class="card">
      <h2>Exportar</h2>
      <p class="muted">Baixa uma planilha .xlsx com os dados atuais (status incluído).</p>
      <button class="btn secondary" id="btnExport">Baixar planilha (.xlsx)</button>
    </div>
  </section>

</main>

<div class="toast" id="toast"></div>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
